name: Crypto Registry ETL & OSINT Pipeline

# Określamy, kiedy pipeline ma się uruchomić
on:
  # 1. Możliwość ręcznego odpalenia z zakładki "Actions" na GitHubie
  workflow_dispatch:
  
  # 2. Automatyczne uruchomienie wg harmonogramu (np. w każdy poniedziałek o 03:00 UTC)
  # Przydatne, aby regularnie odświeżać statusy podmiotów w KRS
  # schedule:
  #  - cron: '0 3 * * 1'
    
  # 3. Uruchomienie przy każdym zmergowaniu/pushu do głównej gałęzi, 
  # ale tylko jeśli zmienił się kod lub lista zależności
  push:
    branches:
      - main
    paths:
      # - 'src/**'
      # - 'requirements.txt'
      - 'data/raw/**' # Uruchomi się też, gdy zaktualizujesz bazowy PDF

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data directories exist
        run: |
          mkdir -p data/raw
          mkdir -p data/processed

      # Krok 1: Ekstrakcja z PDF i wzbogacenie danymi z KRS (teraz z historią)
      - name: Run Extraction & KRS Enrichment
        env:
          PYTHONPATH: .
        run: python src/pipelines/process_ias.py

      # Krok 2: Uruchomienie analizy OSINT/LLM z użyciem Google Gemini
      # Przekazujemy sekret z GitHuba jako zmienną środowiskową
      - name: Run Advanced OSINT Analysis
        env:
          PYTHONPATH: .
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/pipelines/advanced_analysis.py

      # Krok 3: Zapisanie obu wyników jako Artefakty
      - name: Upload processed data as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crypto-data-artifacts
          path: data/processed/*.csv
          retention-days: 30

      # Krok 4: Automatyczny commit do repozytorium
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Wzbogacone dane KRS oraz analiza OSINT (Gemini)"
          file_pattern: 'data/processed/*.csv'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
