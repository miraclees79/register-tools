name: Crypto Registry ETL Pipeline

# Określamy, kiedy pipeline ma się uruchomić
on:
  # 1. Możliwość ręcznego odpalenia z zakładki "Actions" na GitHubie
  workflow_dispatch:
  
  # 2. Automatyczne uruchomienie wg harmonogramu (np. w każdy poniedziałek o 03:00 UTC)
  # Przydatne, aby regularnie odświeżać statusy podmiotów w KRS
  # schedule:
  #  - cron: '0 3 * * 1'
    
  # 3. Uruchomienie przy każdym zmergowaniu/pushu do głównej gałęzi, 
  # ale tylko jeśli zmienił się kod lub lista zależności
  push:
    branches:
      - main
    paths:
      # - 'src/**'
      # - 'requirements.txt'
      - 'data/raw/**' # Uruchomi się też, gdy zaktualizujesz bazowy PDF

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    # Pozwolenia wymagane do automatycznego commita
    permissions:
      contents: write

    steps:
      # Krok 1: Pobranie kodu repozytorium na wirtualną maszynę
      - name: Checkout repository
        uses: actions/checkout@v4

      # Krok 2: Instalacja Pythona (wersja 3.10 jest stabilna dla pandas)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Włączenie cacheowania przyspiesza kolejne uruchomienia

      # Krok 3: Instalacja bibliotek z requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Krok 4: Upewnienie się, że struktura folderów istnieje
      - name: Ensure data directories exist
        run: |
          mkdir -p data/raw
          mkdir -p data/processed

      # Krok 5: Uruchomienie głównego skryptu
      # Ustawiamy PYTHONPATH, aby Python poprawnie widział moduły z folderu src/
      - name: Run extraction and enrichment pipeline
        env:
          PYTHONPATH: .
        run: python src/pipelines/process_ias.py

      # Krok 6: Zapisanie pliku CSV jako artefaktu (dostępny do pobrania w logach akcji przez 30 dni)
      - name: Upload processed data as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: enriched-crypto-data
          path: data/processed/enriched_crypto_register.csv
          retention-days: 30

      # Krok 7: [Opcjonalnie] Automatyczny commit i push przetworzonych danych do repozytorium.
      # To sprawi, że zaktualizowany plik CSV będzie zawsze dostępny bezpośrednio w podkatalogu data/processed/ na GitHubie.
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Wzbogacone dane z rejestru Krypto/KRS"
          file_pattern: 'data/processed/*.csv'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
