name: Crypto Registry ETL & OSINT Pipeline

on:
  workflow_dispatch:
    inputs:
      run_etl:
        description: 'Uruchom ETL (PDF -> KRS)'
        required: true
        default: true
        type: boolean
      run_osint:
        description: 'Uruchom OSINT (LLM / Gemini)'
        required: true
        default: false
        type: boolean
  
  push:
    branches:
      - main
    paths:
      - 'data/raw/**'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data directories exist
        run: |
          mkdir -p data/raw
          mkdir -p data/processed

      # Krok 1: Ekstrakcja z PDF i wzbogacenie danymi z KRS
      # Wykonuje się tylko, gdy run_etl jest true lub przy automatycznym pushu
      - name: Run Extraction & KRS Enrichment
        if: ${{ github.event_name == 'push' || github.event.inputs.run_etl == 'true' }}
        env:
          PYTHONPATH: .
        run: python src/pipelines/process_ias.py

      # Krok 2: Uruchomienie analizy OSINT/LLM
      # Wykonuje się tylko, gdy run_osint jest true
      - name: Run Advanced OSINT Analysis
        if: ${{ github.event.inputs.run_osint == 'true' }}
        env:
          PYTHONPATH: .
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/pipelines/advanced_analysis.py

      # Krok 3: Zapisanie artefaktów
      - name: Upload processed data as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crypto-data-artifacts
          path: data/processed/*.csv
          retention-days: 30

      # Krok 4: Automatyczny commit
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Wykonano wybrane kroki pipeline"
          file_pattern: 'data/processed/*.csv'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"